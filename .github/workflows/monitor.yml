name: Monitor — Every 6 Hours

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          DB_PATH: ./data/business1.db
        run: python b1_monitor.py
      - name: Save monitor results
        run: |
          git config user.name "Monitor Bot"
          git config user.email "monitor@amazon-empire.local"
          git add dashboard_data.json heartbeat_monitor.json || true
          git diff --staged --quiet || git commit -m "Monitor update $(date +%Y-%m-%d\ %H:%M)"
          git push || true
