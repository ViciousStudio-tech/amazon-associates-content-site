name: Rebuild V2 — Anthropic API Only (No SerpApi)

on:
  workflow_dispatch:
    inputs:
      start_index:
        description: 'Article index to start from (0 = beginning)'
        required: false
        default: '0'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic>=0.40.0

      - name: Configure git
        run: |
          git config user.name "DwellPicks Bot"
          git config user.email "bot@dwellpicks.com"

      - name: Run rebuild_v2.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          GH_PAT: ${{ secrets.GH_PAT }}
          START_INDEX: ${{ github.event.inputs.start_index }}
        run: python rebuild_v2.py
