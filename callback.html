<!DOCTYPE html>
<html>
<head><title>Shopify OAuth Callback</title></head>
<body style="font-family:sans-serif;padding:40px;max-width:600px;margin:auto">
<h2>🔑 Shopify OAuth Code Captured</h2>
<p id="msg">Reading authorization code...</p>
<code id="code" style="display:block;background:#f4f4f4;padding:15px;font-size:14px;word-break:break-all;margin:20px 0"></code>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get("code");
const state = params.get("state");
if (code) {
  document.getElementById("msg").textContent = "Authorization code received! Copy it below:";
  document.getElementById("code").textContent = "CODE=" + code;
} else {
  document.getElementById("msg").textContent = "No code found in URL: " + window.location.href;
}
</script>
</body>
</html>
